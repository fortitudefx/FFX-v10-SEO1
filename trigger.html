<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFX — Pipeline Trigger</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0c; --surface: #1a1a1a; --border: #2e2e2e; --border2: #3a3a3a;
      --text: #e8e8e8; --text-mid: #b8b8b8; --muted: #787878; --dim: #484848;
      --green: #4caf7d; --green-bg: #0d2018; --green-bd: #1e4830;
      --blue: #6aa3d8; --blue-bg: #0d1e30; --blue-bd: #1e3a56;
      --red: #e06060; --red-bg: #200d0d; --red-bd: #4a1a1a;
      --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.65; display: flex; flex-direction: column; }
    header { border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; background: rgba(12,12,12,0.96); backdrop-filter: blur(8px); }
    .wordmark { font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
    .header-status { font-family: var(--mono); font-size: 12px; color: var(--muted); }
    main { max-width: 560px; margin: 0 auto; padding: 64px 32px; width: 100%; }
    h1 { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.03em; margin-bottom: 10px; }
    .sub { font-size: 14px; color: var(--text-mid); margin-bottom: 44px; line-height: 1.7; }
    .field-label { font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-mid); margin-bottom: 10px; display: block; }
    input[type="url"], input[type="password"] {
      width: 100%; background: var(--surface); border: 1px solid var(--border2);
      border-radius: 6px; color: #fff; font-family: var(--mono); font-size: 14px;
      padding: 15px 18px; outline: none; transition: border-color 0.15s; margin-bottom: 16px;
    }
    input[type="url"]:focus, input[type="password"]:focus { border-color: var(--blue); }
    input::placeholder { color: var(--dim); }
    .btn-primary {
      width: 100%; background: #fff; color: #000; border: none; border-radius: 6px;
      font-family: var(--sans); font-size: 15px; font-weight: 700; padding: 16px;
      cursor: pointer; transition: background 0.15s, opacity 0.15s;
    }
    .btn-primary:hover:not(:disabled) { background: #e8e8e8; }
    .btn-primary:disabled { opacity: 0.25; cursor: not-allowed; }
    .alert { padding: 14px 18px; border-radius: 6px; font-size: 14px; line-height: 1.6; margin-top: 20px; display: none; }
    .alert.info  { background: var(--blue-bg);  border: 1px solid var(--blue-bd);  color: #8bbfe8; }
    .alert.ok    { background: var(--green-bg); border: 1px solid var(--green-bd); color: #6dcf9a; }
    .alert.error { background: var(--red-bg);   border: 1px solid var(--red-bd);   color: #e88080; }
    .status-log { margin-top: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px 18px; display: none; }
    .status-log .log-line { font-family: var(--mono); font-size: 12px; color: var(--text-mid); line-height: 1.8; }
    .status-log .log-line.done { color: var(--green); }
    .status-log .log-line.active { color: var(--blue); }
  </style>
</head>
<body>
<header>
  <div class="wordmark">FortitudeFX — Pipeline</div>
  <div class="header-status" id="headerStatus">Ready</div>
</header>
<main>
  <h1>Pipeline Trigger</h1>
  <p class="sub">Triggers the full content pipeline server-side. Claude generates both articles, you receive an approval email. No waiting here.</p>

  <label class="field-label" for="ytUrl">YouTube URL</label>
  <input type="url" id="ytUrl" placeholder="https://youtu.be/..." autocomplete="off" spellcheck="false" value="https://youtu.be/Tt0s1YuWPmU?si=1ZvhC5BOf-MR3yrg" />

  <button class="btn-primary" id="triggerBtn" onclick="trigger()">Run Pipeline</button>

  <div class="alert" id="alert"></div>

  <div class="status-log" id="statusLog">
    <div class="log-line" id="log1">⏳ Connecting to pipeline...</div>
    <div class="log-line" id="log2"></div>
    <div class="log-line" id="log3"></div>
  </div>
</main>

<script>
  async function trigger() {
    const url = document.getElementById('ytUrl').value.trim();

    const btn = document.getElementById('triggerBtn');
    const alert = document.getElementById('alert');
    const log = document.getElementById('statusLog');

    if (!url) { showAlert('Paste a YouTube URL first.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Running…';
    alert.style.display = 'none';
    log.style.display = 'block';
    document.getElementById('headerStatus').textContent = 'Running…';

    setLog(1, '⏳ Sending to pipeline Worker...', 'active');
    setLog(2, '', '');
    setLog(3, '', '');

    try {
      const res = await fetch('/pipeline', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ youtubeUrl: url }),
      });

      const data = await res.json();

      if (!res.ok) {
        setLog(1, '❌ Pipeline failed', 'error');
        setLog(2, data.error || 'Unknown error', '');
        showAlert(data.error || 'Pipeline failed. Check Cloudflare logs.', 'error');
        btn.disabled = false;
        btn.textContent = 'Run Pipeline';
        document.getElementById('headerStatus').textContent = 'Error';
        return;
      }

      setLog(1, '✅ Pipeline complete', 'done');
      setLog(2, `Global: ${data.globalSlug}`, 'done');
      setLog(3, `Regional (${data.region}): ${data.regionalSlug}`, 'done');
      showAlert('Pipeline complete. Check your email for the approval request.', 'ok');
      document.getElementById('headerStatus').textContent = 'Done — check email';
      btn.textContent = 'Run Pipeline';
      btn.disabled = false;

    } catch (err) {
      setLog(1, '❌ Network error', 'error');
      showAlert('Network error: ' + err.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Run Pipeline';
      document.getElementById('headerStatus').textContent = 'Error';
    }
  }

  function setLog(n, text, cls) {
    const el = document.getElementById('log' + n);
    el.textContent = text;
    el.className = 'log-line' + (cls ? ' ' + cls : '');
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert ' + type;
    el.style.display = 'block';
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('ytUrl').addEventListener('keydown', e => {
      if (e.key === 'Enter') trigger();
    });
  });
</script>
</body>
</html>
