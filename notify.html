<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFX — Notify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0c; --surface: #1a1a1a; --border: #2e2e2e; --border2: #3a3a3a;
      --text: #e8e8e8; --text-mid: #b8b8b8; --muted: #787878; --dim: #484848;
      --green: #4caf7d; --green-bg: #0d2018; --green-bd: #1e4830;
      --blue: #6aa3d8; --blue-bg: #0d1e30; --blue-bd: #1e3a56;
      --red: #e06060; --red-bg: #200d0d; --red-bd: #4a1a1a;
      --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.65; }
    header { border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; background: rgba(12,12,12,0.96); backdrop-filter: blur(8px); }
    .wordmark { font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
    .header-status { font-family: var(--mono); font-size: 12px; color: var(--muted); }
    main { max-width: 560px; margin: 0 auto; padding: 64px 32px; }
    h1 { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.03em; margin-bottom: 10px; }
    .sub { font-size: 14px; color: var(--text-mid); margin-bottom: 44px; line-height: 1.7; }
    .field-label { font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-mid); margin-bottom: 10px; display: block; }
    input[type="url"] { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; color: #fff; font-family: var(--mono); font-size: 14px; padding: 15px 18px; outline: none; transition: border-color 0.15s; margin-bottom: 16px; }
    input[type="url"]:focus { border-color: var(--blue); }
    input::placeholder { color: var(--dim); }
    .btn-primary { width: 100%; background: #fff; color: #000; border: none; border-radius: 6px; font-family: var(--sans); font-size: 15px; font-weight: 700; padding: 16px; cursor: pointer; transition: background 0.15s, opacity 0.15s; }
    .btn-primary:hover:not(:disabled) { background: #e8e8e8; }
    .btn-primary:disabled { opacity: 0.25; cursor: not-allowed; }
    .alert { padding: 14px 18px; border-radius: 6px; font-size: 14px; line-height: 1.6; margin-top: 20px; display: none; }
    .alert.info  { background: var(--blue-bg);  border: 1px solid var(--blue-bd);  color: #8bbfe8; }
    .alert.ok    { background: var(--green-bg); border: 1px solid var(--green-bd); color: #6dcf9a; }
    .alert.error { background: var(--red-bg);   border: 1px solid var(--red-bd);   color: #e88080; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 36px 0; }
    .quick-links { display: flex; gap: 12px; flex-wrap: wrap; }
    .quick-link { font-family: var(--mono); font-size: 12px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 8px 14px; cursor: pointer; transition: all 0.15s; text-decoration: none; }
    .quick-link:hover { border-color: var(--border2); color: var(--text-mid); }
  </style>
</head>
<body>
<header>
  <div class="wordmark">FortitudeFX™ — Notify</div>
  <div class="header-status" id="headerStatus">Ready</div>
</header>
<main>
  <h1>Send Reminder Email</h1>
  <p class="sub">Paste a YouTube URL and send yourself an email with a direct link to FFX Press. Generation happens in the background — content will be ready and waiting when you open the link.</p>

  <label class="field-label" for="ytUrl">YouTube URL</label>
  <input type="url" id="ytUrl" placeholder="https://youtu.be/..." autocomplete="off" spellcheck="false" />

  <button class="btn-primary" id="sendBtn" onclick="send()">Send Reminder Email</button>

  <div class="alert" id="alert"></div>

  <hr class="divider">

  <div class="field-label">Quick links</div>
  <div class="quick-links">
    <a href="/press" class="quick-link">FFX Press</a>
    <a href="/generate" class="quick-link">Generate</a>
  </div>
</main>

<script>
  // Pre-fill URL from query param — for future Cron use
  const params = new URLSearchParams(window.location.search);
  const preUrl = params.get('url');
  if (preUrl) document.getElementById('ytUrl').value = preUrl;

  async function send() {
    const url = document.getElementById('ytUrl').value.trim();
    const btn = document.getElementById('sendBtn');

    if (!url) { showAlert('Paste a YouTube URL first.', 'error'); return; }
    if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
      showAlert('That does not look like a YouTube URL.', 'error'); return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending…';
    hideAlert();
    document.getElementById('headerStatus').textContent = 'Sending…';

    try {
      const res = await fetch('/notify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ youtubeUrl: url }),
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert(data.error || 'Failed to send email.', 'error');
        btn.disabled = false;
        btn.textContent = 'Send Reminder Email';
        document.getElementById('headerStatus').textContent = 'Error';
        return;
      }

      showAlert('Email sent. Generation is running in the background — content will be ready when you open the Press link. Link expires in 24 hours from now.', 'ok');
      document.getElementById('headerStatus').textContent = 'Email sent';
      btn.disabled = false;
      btn.textContent = 'Send Reminder Email';

    } catch (err) {
      showAlert('Network error: ' + err.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Send Reminder Email';
      document.getElementById('headerStatus').textContent = 'Error';
    }
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert ' + type;
    el.style.display = 'block';
  }

  function hideAlert() { document.getElementById('alert').style.display = 'none'; }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('ytUrl').addEventListener('keydown', e => {
      if (e.key === 'Enter') send();
    });
  });
</script>
</body>
</html>
