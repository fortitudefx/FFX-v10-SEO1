name: Deploy FFX Cron Worker

on:
  push:
    branches:
      - main
    paths:
      - 'ffx-cron/**'
      # ffx-cron bundles lib/keyword + lib/gate (keyword source mode, self-seed),
      # so a lib change must also redeploy this worker.
      - 'lib/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Cron Worker
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: ffx-cron
