name: Deploy FFX Consumer Worker

on:
  push:
    branches:
      - main
    paths:
      - 'ffx-consumer/**'
      # The consumer bundles the shared quality gate (repo-root lib/gate) via a
      # relative import, so gate changes must also redeploy the consumer worker.
      - 'lib/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Consumer Worker
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ffx-consumer
          wranglerVersion: '3'
