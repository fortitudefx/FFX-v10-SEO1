<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFX Queue</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/dashboard-styles.css">
  <style>
    /* Two-column layout */
    .queue-layout {
      max-width: var(--content-max);
      width: calc(100% - 80px);
      margin: 32px auto 80px;
      display: grid;
      grid-template-columns: 1fr 600px;
      gap: 20px;
      align-items: start;
      position: relative; z-index: 1;
    }

    /* Active queue — same styling as content-wrap */
    .queue-active {
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 40px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.03);
      background: #16181f;
      overflow: hidden;
    }

    /* Parked column */
    .queue-parked {
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 40px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.03);
      background: #16181f;
      overflow: hidden;
      position: sticky;
      top: calc(var(--nav-h) + var(--header-h) + 20px);
    }

    .queue-col-header {
      padding: 14px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: space-between;
    }
    .queue-col-title {
      font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.40);
    }
    .queue-col-count {
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px; padding: 2px 8px;
    }

    /* Parked items */
    .parked-item {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center; gap: 12px;
      transition: background 0.15s;
    }
    .parked-item:last-child { border-bottom: none; }
    .parked-item:hover { background: rgba(255,255,255,0.03); }
    .parked-thumb {
      width: 120px; height: 68px; border-radius: 5px; object-fit: cover;
      background: rgba(255,255,255,0.06); flex-shrink: 0;
    }
    .parked-info { flex: 1; min-width: 0; }
    .parked-title {
      font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.70);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .parked-id { font-size: 11px; color: rgba(255,255,255,0.28); }
    .btn-unpark {
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      background: none; color: rgba(255,255,255,0.30);
      border: 1px solid rgba(255,255,255,0.10); border-radius: 5px;
      padding: 4px 10px; cursor: pointer; transition: all 0.15s; flex-shrink: 0;
      white-space: nowrap;
    }
    .btn-unpark:hover { color: rgba(255,255,255,0.70); border-color: rgba(255,255,255,0.22); }

    /* Park button on queue rows */
    .btn-park {
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      background: none; color: rgba(255,255,255,0.28);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 5px;
      padding: 4px 10px; cursor: pointer; transition: all 0.15s;
      margin-top: 6px; display: inline-block;
    }
    .btn-park:hover { color: rgba(201,168,76,0.80); border-color: rgba(201,168,76,0.30); }

    .parked-empty {
      padding: 40px 24px; text-align: center;
      font-size: 12px; color: rgba(255,255,255,0.20);
      letter-spacing: 0.06em; text-transform: uppercase; line-height: 1.8;
    }

    /* YT Metadata panel */
    .btn-yt-meta {
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      background: rgba(255,0,0,0.08); color: rgba(255,100,100,0.80);
      border: 1px solid rgba(255,0,0,0.20); border-radius: 5px;
      padding: 4px 10px; cursor: pointer; transition: all 0.15s; margin-top: 6px; display: inline-block;
    }
    .btn-yt-meta:hover { background: rgba(255,0,0,0.14); border-color: rgba(255,0,0,0.35); color: #fff; }
    .btn-yt-meta:disabled { opacity: 0.5; cursor: not-allowed; }
    .yt-meta-panel {
      padding: 20px 24px;
      background: rgba(255,0,0,0.04);
      border-top: 1px solid rgba(255,0,0,0.12);
    }
    .yt-meta-title-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; }
    .yt-meta-label { font-size: 9px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,100,100,0.70); flex-shrink: 0; }
    .yt-meta-value { font-size: 14px; color: rgba(255,255,255,0.85); font-weight: 600; flex: 1; }
    .yt-meta-alt { font-size: 12px; color: rgba(255,255,255,0.50); margin-bottom: 4px; cursor: pointer; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .yt-meta-alt:hover { color: rgba(255,255,255,0.80); }
    .yt-meta-desc { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.6; white-space: pre-wrap; max-height: 200px; overflow-y: auto; background: rgba(255,255,255,0.03); padding: 10px 14px; border-radius: 6px; margin-bottom: 10px; }
    .yt-meta-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .yt-meta-tag { font-size: 10px; color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10); padding: 2px 8px; border-radius: 4px; }
    .yt-meta-thumb { font-size: 13px; color: rgba(255,255,255,0.65); font-style: italic; margin-bottom: 10px; }
    .btn-copy-meta { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.50); border: 1px solid rgba(255,255,255,0.12); border-radius: 5px; padding: 4px 12px; cursor: pointer; margin-right: 6px; transition: all 0.15s; }
    .btn-copy-meta:hover { background: rgba(255,255,255,0.10); color: rgba(255,255,255,0.80); }

    /* Manual add form */
    .queue-add-form {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; gap: 8px; align-items: center;
    }
    .queue-add-input {
      flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10);
      border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 13px;
      padding: 8px 12px; outline: none; transition: border-color 0.15s;
    }
    .queue-add-input:focus { border-color: rgba(255,255,255,0.22); }
    .queue-add-input::placeholder { color: rgba(255,255,255,0.22); }
    .btn-queue-add {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.70);
      border: 1px solid rgba(255,255,255,0.14); border-radius: 6px;
      padding: 8px 16px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-queue-add:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.22); color: #fff; }
    .btn-queue-add:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Reorder buttons */
    .btn-reorder {
      font-size: 11px; font-weight: 700; background: none;
      color: rgba(255,255,255,0.22); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px; width: 22px; height: 22px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all 0.15s; padding: 0; line-height: 1;
    }
    .btn-reorder:hover { color: rgba(255,255,255,0.70); border-color: rgba(255,255,255,0.20); background: rgba(255,255,255,0.06); }
    .btn-reorder:disabled { opacity: 0.20; cursor: not-allowed; }
    .reorder-btns { display: flex; flex-direction: row; gap: 4px; margin-top: 4px; }
  </style>
</head>
<body>

  <div class="nav-inner">

  <div class="nav-links">

    <a href="/dashboard-press.html"     class="nav-link">Press</a>

    <a href="/dashboard-knowledge.html" class="nav-link">Knowledge</a>

</nav>

<div class="page-header">
  <div class="page-header-inner">
  <div class="page-header-left">
    <div class="wordmark">FFX <span>Queue</span></div>
    <div class="header-count" id="headerCount">—</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="status-dot"></div>
  </div>
  </div>
</div>

<div class="queue-layout">

  <!-- Active Queue -->
  <div class="queue-active">
    <div class="queue-add-form">
      <input class="queue-add-input" id="addUrlInput" type="text" placeholder="Paste YouTube URL to add to queue…" />
      <button class="btn-queue-add" id="addBtn" onclick="addToQueue()">+ Add to Queue</button>
    </div>
    <div class="table-header" style="grid-template-columns:200px 1fr 180px 140px;">
      <div>Video</div>
      <div>Title &amp; URL</div>
      <div>State</div>
      <div>Added</div>
    </div>
    <div id="queueRows">
      <div class="loading-state"><div class="loading-spin"></div><div class="loading-text">Loading queue&hellip;</div></div>
    </div>
  </div>

  <!-- Parked -->
  <div class="queue-parked">
    <div class="queue-col-header">
      <span class="queue-col-title">Parked</span>
      <span class="queue-col-count" id="parkedCount">0</span>
    </div>
    <div id="parkedRows">
      <div class="parked-empty">Move videos here<br>to skip them.<br>Cron ignores parked videos.</div>
    </div>
  </div>

</div>

<script>
let pollTimers = {};

const PLATFORMS = [
  {key:'blog',label:'Blog'},{key:'x',label:'X'},{key:'linkedin',label:'LinkedIn'},
  {key:'tumblr',label:'Tumblr'},{key:'discord',label:'Discord'}
];
const FIELD_MAP = {
  blog:['body'],x:['tweet1','tweet2','tweet3','tweet4','tweet5','tweet6'],
  linkedin:['linkedin'],discord:['discord'],tumblr:['tumblr']
};
const STEPS = ['transcript','global_article','global_platforms','regional_article','regional_platforms','library'];
const STEP_LABELS = {
  transcript:'① Fetching transcript',
  global_article:'② Writing global article',
  global_platforms:'③ Writing platform content',
  regional_article:'④ Writing regional article',
  regional_platforms:'⑤ Writing regional platforms',
  library:'⑥ Extracting knowledge nuggets'
};

async function init() {
  // Enter key on manual add input
  const addInput = document.getElementById('addUrlInput');
  if(addInput) addInput.addEventListener('keydown', e => { if(e.key==='Enter') addToQueue(); });

  const params   = new URLSearchParams(window.location.search);
  const openItem = params.get('video');
  await loadQueue();
  if (openItem) {
    setTimeout(() => {
      const row = document.querySelector('.queue-row[data-videoid="'+openItem+'"]');
      if (row) { row.querySelector('.row-summary')?.click(); row.scrollIntoView({behavior:'smooth',block:'start'}); }
    }, 400);
  }
}

// ── Parked KV via API ─────────────────────────────────────────────────────
async function getParked() {
  try {
    const res = await fetch('/api/parked-queue');
    if (!res.ok) return [];
    const data = await res.json();
    return data.parked || [];
  } catch { return []; }
}

async function saveParked(parked) {
  try {
    await fetch('/api/parked-queue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ parked })
    });
  } catch {}
}

async function parkItem(videoId) {
  // Find item in active queue
  const row = document.querySelector('.queue-row[data-videoid="'+videoId+'"]');
  if (!row) return;

  // Get current queue from server, remove this item
  try {
    const res  = await fetch('/queue');
    const data = await res.json();
    const queue = data.queue || [];
    const item  = queue.find(q => q.videoId === videoId);
    if (!item) return;

    // Remove from active queue via API
    await fetch('/api/queue-remove', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ videoId })
    });

    // Add to parked list
    const parked = await getParked();
    if (!parked.find(p => p.videoId === videoId)) {
      parked.push({ videoId, title: item.title || '', youtubeUrl: item.youtubeUrl || '', parkedAt: new Date().toISOString() });
      await saveParked(parked);
    }

    await loadQueue();
  } catch(err) { console.error('Park error:', err); }
}

async function unparkItem(videoId) {
  try {
    // Remove from parked
    const parked = await getParked();
    const item   = parked.find(p => p.videoId === videoId);
    if (!item) return;
    const updated = parked.filter(p => p.videoId !== videoId);
    await saveParked(updated);

    // Add back to active queue bottom
    await fetch('/queue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ videoId, youtubeUrl: item.youtubeUrl, title: item.title })
    });

    await loadQueue();
  } catch(err) { console.error('Unpark error:', err); }
}

async function renderParked() {
  const parked  = await getParked();
  const el      = document.getElementById('parkedRows');
  const countEl = document.getElementById('parkedCount');
  countEl.textContent = parked.length;

  if (!parked.length) {
    el.innerHTML = '<div class="parked-empty">Move videos here<br>to skip them.<br>Cron ignores parked videos.</div>';
    return;
  }

  el.innerHTML = '';
  parked.forEach(item => {
    const div = document.createElement('div');
    div.className = 'parked-item';
    div.innerHTML = '<img class="parked-thumb" src="https://img.youtube.com/vi/'+item.videoId+'/mqdefault.jpg" onerror="this.style.display=\'none\'" alt="">'
      + '<div class="parked-info">'
      + '<div class="parked-title">'+(item.title ? escHtml(item.title) : escHtml(item.videoId))+'</div>'
      + '<a href="'+escHtml(item.youtubeUrl)+'" target="_blank" style="font-size:12px;color:rgba(255,255,255,0.45);text-decoration:none;display:inline;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" onclick="event.stopPropagation()">'+escHtml(item.youtubeUrl)+'</a>'
      + '</div>'
      + '<button class="btn-unpark" onclick="unparkItem(\''+escHtml(item.videoId)+'\')">↑ Activate</button>';
    el.appendChild(div);
  });
}

async function loadQueue() {
  try {
    const res  = await fetch('/queue');
    const data = await res.json();
    if (!res.ok) { document.getElementById('queueRows').innerHTML='<div class="empty-state"><p>Error: '+escHtml(data.error||'Unknown')+'</p></div>'; return; }
    const queue = data.queue || [];
    document.getElementById('headerCount').textContent = queue.length + ' items';
    renderQueue(queue);
    renderParked();
  } catch (err) {
    document.getElementById('queueRows').innerHTML='<div class="empty-state"><p>Network error: '+escHtml(err.message)+'</p></div>';
  }
}

function renderQueue(queue) {
  const container = document.getElementById('queueRows');
  if (!queue.length) { container.innerHTML='<div class="empty-state"><p>Queue is empty. Cron will add videos automatically at 9am Dubai time.</p></div>'; return; }
  container.innerHTML = '';
  queue.forEach(item => container.appendChild(buildQueueRow(item)));
}

function buildQueueRow(item) {
  const videoId = item.videoId || '';
  const ytUrl   = item.youtubeUrl || '';
  const title   = item.title || '';
  const row     = document.createElement('div');
  row.className = 'queue-row';
  row.dataset.videoid = videoId;

  const thumbHtml = '<div class="row-thumb-wrap" style="width:200px;height:112px;">'
    + '<img class="row-thumb" src="https://img.youtube.com/vi/'+videoId+'/mqdefault.jpg" '
    + 'onerror="this.parentElement.innerHTML=\'<div class=\\\'row-thumb-placeholder\\\'>No thumb</div>\'" alt=""></div>';

  let badgeHtml = '', actionHtml = '';
  const isOrange = item.state === 'orange';
  if (isOrange) {
    const hrs = item.expiresInMs ? Math.max(0,Math.floor(item.expiresInMs/3600000)) : 0;
    const min = item.expiresInMs ? Math.max(0,Math.floor((item.expiresInMs%3600000)/60000)) : 0;
    badgeHtml = '<span class="state-badge badge-ready">\u2713 Ready &middot; '+hrs+'h '+min+'m</span>';
    if (item.hasQueueEdits) badgeHtml += '<br><span class="state-badge badge-edited" style="margin-top:6px;">\u26a0 Edited</span>';
  } else if (item.state === 'red') {
    badgeHtml  = '<span class="state-badge badge-expired">\u2715 Expired</span>';
    actionHtml = '<br><button class="btn-gen-row" onclick="generateItem(event,\''+videoId+'\',\''+escHtml(ytUrl)+'\')">Regenerate</button>';
  } else if (item.state === 'generating') {
    badgeHtml = '<span class="state-badge badge-generating">\u25cf Generating</span>';
  } else {
    const src = (item.addedBy==='cron'||item.addedBy==='cron-new') ? 'Cron' : 'Manual';
    badgeHtml  = '<span class="state-badge badge-grey">'+src+'</span>';
    actionHtml = '<br><button class="btn-gen-row" onclick="generateItem(event,\''+videoId+'\',\''+escHtml(ytUrl)+'\')">Generate</button>';
  }

  // Park button — always visible
  const parkBtn = '<button class="btn-park" onclick="event.stopPropagation();parkItem(\''+videoId+'\')">→ Park</button>';

  // Reorder buttons — all states except actively generating
  const reorderBtns = item.state !== 'generating'
    ? '<div class="reorder-btns">'
      + '<button class="btn-reorder" title="Move up" onclick="event.stopPropagation();moveQueueItem(\''+videoId+'\',\'up\')">▲</button>'
      + '<button class="btn-reorder" title="Move down" onclick="event.stopPropagation();moveQueueItem(\''+videoId+'\',\'down\')">▼</button>'
      + '</div>'
    : '';

  // YT Metadata button — only for orange state (content ready, transcript exists)
  const ytMetaBtn = isOrange
    ? '<button class="btn-yt-meta" id="ytbtn-'+videoId+'" onclick="event.stopPropagation();generateYTMetadata(\''+videoId+'\',\''+escHtml(ytUrl)+'\',\''+escHtml(title)+'\')">▶ YT Metadata</button>'
    : '';

  const summary = document.createElement('div');
  summary.className = 'row-summary';
  summary.style.gridTemplateColumns = '200px 1fr 180px 140px'; summary.style.cursor = 'default';
  summary.innerHTML = thumbHtml
    + '<div class="row-info">'
    + '<div class="row-title">'+(title ? escHtml(title) : '<span style="color:rgba(255,255,255,0.24);font-style:italic;font-size:14px;">Title loads after generation</span>')+'</div>'
    + '<div class="row-meta"><span class="region-tag region-global">Global</span><span class="row-slug">'+escHtml(videoId)+'</span></div>'
    + (ytUrl ? '<a class="row-yt-url" href="'+escHtml(ytUrl)+'" target="_blank" onclick="event.stopPropagation()">'+escHtml(ytUrl)+'</a>' : '')
    + '</div>'
    + '<div style="display:flex;flex-direction:column;gap:6px;justify-content:flex-start;padding-top:4px;">'
    + badgeHtml + actionHtml + parkBtn + ytMetaBtn + reorderBtns
    + (item.state==='generating'&&item.jobId ? '<div class="row-progress" id="rp-'+videoId+'"><div class="step active"><div class="step-spinner"></div> Starting\u2026</div></div>' : '')
    + '</div>'
    + '<div class="row-date">'+formatDate(item.addedAt)+(isOrange?'<span class="row-chevron">\u25bc</span>':'')+'</div>';

  if (isOrange) {
    const infoEl = summary.querySelector('.row-info');
    const dateEl = summary.querySelector('.row-date');
    if (infoEl) { infoEl.style.cursor='pointer'; infoEl.addEventListener('click', (e) => { if(e.target.closest('.row-yt-url'))return; toggleRow(row,item); }); }
    if (dateEl) { dateEl.style.cursor='pointer'; dateEl.addEventListener('click', () => toggleRow(row,item)); }
  }

  row.appendChild(summary);
  const expanded = document.createElement('div'); expanded.className='row-expanded';
  row.appendChild(expanded);
  if (item.state==='generating' && item.jobId) startPolling(item.jobId, videoId, summary);
  return row;
}

function toggleRow(row, item) {
  const isOpen = row.classList.contains('open');
  document.querySelectorAll('.queue-row.open').forEach(r => r.classList.remove('open'));
  if (!isOpen) {
    row.classList.add('open');
    const expanded = row.querySelector('.row-expanded');
    if (!expanded.dataset.built) loadExpandedContent(expanded, item);
  }
}

async function loadExpandedContent(container, item) {
  container.innerHTML = '<div class="loading-state" style="padding:40px 0"><div class="loading-spin"></div><div class="loading-text">Loading content\u2026</div></div>';
  try {
    const [videoRes, editsRes] = await Promise.all([
      fetch('/api/video-content?videoId='+item.videoId),
      fetch('/api/queue-edits?videoId='+item.videoId)
    ]);
    const editsData   = editsRes.ok  ? await editsRes.json()  : {edits:{},editedFields:[]};
    const videoData   = videoRes.ok  ? await videoRes.json()  : null;
    const videoRecord = videoData?.video || null;
    if (!videoRecord) {
      container.innerHTML = '<div class="empty-state" style="padding:40px 0">'
        + '<p style="color:var(--red);font-size:14px;">'
        + (videoData?.error || 'Content not found. The 24hr window may have expired.')
        + '</p></div>';
      return;
    }
    buildExpandedContent(container, videoRecord, editsData, item);
    container.dataset.built = '1';
  } catch (err) {
    container.innerHTML = '<div class="empty-state" style="padding:40px 0"><p style="color:var(--red);">Error: '+escHtml(err.message)+'</p></div>';
  }
}

function buildExpandedContent(container, videoRecord, editsData, queueItem) {
  const platforms    = videoRecord.platforms || {};
  const videoId      = videoRecord.videoId   || queueItem.videoId;
  const slug         = videoRecord.slug      || '';
  const queueEdits   = editsData.edits       || {};
  const editedFields = editsData.editedFields || [];

  const gc     = platforms.blog_global?.content || {};
  const tweets = [1,2,3,4,5,6].map(i => queueEdits['tweet'+i]||gc['tweet'+i]).filter(Boolean);

  const panelsData = [
    { key:'article', label:'Article', platformKey:'blog',
      html: () => '<div class="content-block article-body" data-field="body" data-edit-active="false">'+(queueEdits.body||gc.body||'<em>No article body found.</em>')+'</div>'
    },
    { key:'x', label:'X', platformKey:'x',
      html: () => tweets.length
        ? '<div class="tweet-list">'+tweets.map((t,i)=>'<div class="tweet-item" data-field="tweet'+(i+1)+'" data-edit-active="false"><span class="tweet-num">'+(i+1)+'</span><span class="tweet-text">'+escHtml(t)+'</span></div>').join('')+'</div>'
        : '<div class="content-block"><em>No tweets found.</em></div>'
    },
    { key:'linkedin', label:'LinkedIn', platformKey:'linkedin',
      html: () => '<div class="content-block" data-field="linkedin" data-edit-active="false">'+(queueEdits.linkedin||platforms.linkedin?.content?.text||gc.linkedin||'<em>No LinkedIn content.</em>')+'</div>'
    },
    { key:'discord', label:'Discord', platformKey:'discord',
      html: () => '<div class="content-block" data-field="discord" data-edit-active="false">'+(queueEdits.discord||platforms.discord?.content?.text||gc.discord||'<em>No Discord content.</em>')+'</div>'
    },
    { key:'tumblr', label:'Tumblr', platformKey:'tumblr',
      html: () => '<div class="content-block" data-field="tumblr" data-edit-active="false">'+(queueEdits.tumblr||platforms.tumblr?.content?.text||gc.tumblr||'<em>No Tumblr content.</em>')+'</div>'
    }
  ];

  const tabBar=document.createElement('div'); tabBar.className='platform-tabs';
  const panelContainer=document.createElement('div'); panelContainer.className='platform-panels';

  panelsData.forEach((p,idx) => {
    const isEdited = editedFields.some(f => (FIELD_MAP[p.platformKey]||[p.key]).includes(f));
    const tab = document.createElement('button');
    tab.className = 'ptab'+(idx===0?' active':''); tab.dataset.panel=p.key;
    tab.innerHTML = p.label+(isEdited?'<span class="ptab-chip ptab-chip-edited">\u26a0 Edited</span>':'');
    tab.addEventListener('click',()=>switchTab(panelContainer,tabBar,p.key));
    tabBar.appendChild(tab);

    const panel=document.createElement('div'); panel.className='ppanel'+(idx===0?' active':''); panel.dataset.panel=p.key;
    const sbCls = isEdited ? 'psb-chip-edited' : 'psb-chip-pend';
    const sbTxt = isEdited ? '\u26a0 Edited \u2014 not published' : '\u25cb Not published';
    panel.innerHTML='<div class="platform-status-bar"><div class="psb-left"><span class="psb-status-chip '+sbCls+'">'+sbTxt+'</span></div></div>'+p.html();
    panelContainer.appendChild(panel);
  });

  const actionRow=document.createElement('div'); actionRow.className='action-row'; actionRow.innerHTML='<span class="action-label">Publish to:</span>';
  PLATFORMS.forEach(p=>{
    const chk=document.createElement('div');
    chk.className='platform-checkbox checked'; chk.dataset.platform=p.key; chk.dataset.checked='true';
    chk.innerHTML='<span class="chk-dot"></span>'+p.label;
    chk.addEventListener('click',()=>{
      const c=chk.dataset.checked==='true'; chk.dataset.checked=c?'false':'true';
      if(!c){chk.classList.add('checked');chk.innerHTML='<span class="chk-dot"></span>'+p.label;}
      else{chk.classList.remove('checked');chk.innerHTML='<span class="chk-dot"></span>'+p.label+' \u2014';}
    });
    actionRow.appendChild(chk);
  });
  const pubBtn=document.createElement('button'); pubBtn.className='btn-publish'; pubBtn.textContent='Publish';
  pubBtn.onclick=()=>publishQueueItem(videoId,slug,actionRow,pubBtn,container,videoRecord,editsData);
  actionRow.appendChild(pubBtn);

  const pubResult=document.createElement('div'); pubResult.className='pub-result';
  const inner=document.createElement('div'); inner.className='expanded-inner'; inner.innerHTML='';

  panelContainer.querySelectorAll('.content-block[data-field]').forEach(el=>{
    el.addEventListener('click',()=>makeQueueEditable(el,videoId,el.dataset.field,editsData,tabBar));
  });
  panelContainer.querySelectorAll('.tweet-item[data-field]').forEach(el=>{
    el.addEventListener('click',()=>{const ts=el.querySelector('.tweet-text');if(ts)makeQueueEditable(ts,videoId,el.dataset.field,editsData,tabBar);});
  });

  inner.appendChild(tabBar); inner.appendChild(panelContainer); inner.appendChild(actionRow); inner.appendChild(pubResult);
  container.innerHTML=''; container.appendChild(inner);
}

function makeQueueEditable(el,videoId,field,editsData,tabBar){
  if(el.dataset.editActive==='true')return; el.dataset.editActive='true'; const original=el.innerText;
  el.setAttribute('contenteditable','true'); el.focus();
  let bar=el.nextElementSibling;
  if(!bar||!bar.classList.contains('edit-save-bar')){bar=document.createElement('div');bar.className='edit-save-bar';bar.innerHTML='<span class="edit-save-bar-label">Editing '+field+' \u2014 unsaved</span><button class="btn-edit-discard">Discard</button><button class="btn-edit-save">Save</button>';el.parentNode.insertBefore(bar,el.nextSibling);}
  bar.classList.add('visible');
  bar.querySelector('.btn-edit-save').onclick=()=>saveQueueEdit(el,bar,videoId,field,editsData,tabBar);
  bar.querySelector('.btn-edit-discard').onclick=()=>{el.setAttribute('contenteditable','false');el.innerText=original;el.dataset.editActive='false';bar.classList.remove('visible');};
}

async function saveQueueEdit(el,bar,videoId,field,editsData,tabBar){
  const saveBtn=bar.querySelector('.btn-edit-save'); saveBtn.disabled=true; saveBtn.textContent='Saving\u2026';
  const value = (field==='body') ? el.innerHTML : el.innerText.trim();
  try{
    const res=await fetch('/api/queue-edits',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId,field,value})});
    const data=await res.json();
    if(!res.ok){saveBtn.disabled=false;saveBtn.textContent='Save';bar.querySelector('.edit-save-bar-label').textContent='Error: '+(data.error||'Save failed');return;}
    editsData.edits=editsData.edits||{}; editsData.edits[field]=value;
    if(!editsData.editedFields)editsData.editedFields=[];
    if(!editsData.editedFields.includes(field))editsData.editedFields.push(field);
    el.setAttribute('contenteditable','false');el.dataset.editActive='false';bar.classList.remove('visible');saveBtn.disabled=false;saveBtn.textContent='Save';
    const tabKey=field==='body'?'article':(/^tweet/.test(field)?'x':field);
    const tabEl=tabBar.querySelector('.ptab[data-panel="'+tabKey+'"]');
    if(tabEl&&!tabEl.innerHTML.includes('ptab-chip-edited')){
      const lbl={article:'Article',x:'X',linkedin:'LinkedIn',discord:'Discord',tumblr:'Tumblr'}[tabKey]||tabKey;
      tabEl.innerHTML=lbl+'<span class="ptab-chip ptab-chip-edited">\u26a0 Edited</span>';
    }
    const row=document.querySelector('.queue-row[data-videoid="'+videoId+'"]');
    if(row&&!row.querySelector('.badge-edited')){
      const stateDiv=row.querySelector('[style*="flex-direction:column"]');
      if(stateDiv){const eb=document.createElement('span');eb.className='state-badge badge-edited';eb.style.marginTop='6px';eb.textContent='\u26a0 Edited';stateDiv.appendChild(eb);}
    }
  }catch(err){saveBtn.disabled=false;saveBtn.textContent='Save';bar.querySelector('.edit-save-bar-label').textContent='Network error \u2014 try again';}
}

async function publishQueueItem(videoId,slug,actionRow,pubBtn,container,videoRecord,editsData){
  const platforms={};
  actionRow.querySelectorAll('.platform-checkbox').forEach(el=>{platforms[el.dataset.platform]=el.dataset.checked==='true';});
  if(!Object.values(platforms).some(v=>v)){showPubResult(container,'Select at least one platform.',false);return;}
  pubBtn.disabled=true; pubBtn.textContent='Publishing\u2026';
  const gc=videoRecord.platforms?.blog_global?.content||{};
  const merged={...gc,...(editsData.edits||{})};
  const regional=videoRecord.platforms?.blog_regional?.content||null;
  try{
    const res=await fetch('/press-publish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId,slug,platforms,content:merged,regionalContent:regional,source:'queue'})});
    const data=await res.json();
    if(!res.ok){showPubResult(container,data.error||'Publish failed.',false);pubBtn.disabled=false;pubBtn.textContent='Publish';return;}
    showPubResult(container,'\u2713 Published \u2014 moving to Press',true);
    pubBtn.disabled=false;pubBtn.textContent='Publish';
    setTimeout(async()=>await loadQueue(),1500);
  }catch(err){showPubResult(container,'Network error: '+err.message,false);pubBtn.disabled=false;pubBtn.textContent='Publish';}
}

async function generateItem(e,videoId,youtubeUrl){
  e.stopPropagation();
  const btn=e.target; const row=btn.closest('.queue-row');
  btn.disabled=true; btn.textContent='Queuing\u2026';
  try{
    const res=await fetch('/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({youtubeUrl})});
    const data=await res.json();
    if(!res.ok){
      btn.disabled=false; btn.textContent='Generate';
      const errDiv=document.createElement('div');
      errDiv.style.cssText='font-size:12px;color:var(--red);margin-top:8px;padding:8px 12px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:4px;';
      errDiv.textContent='Error: '+(data.error||'Generation failed. Check Worker logs.');
      btn.parentNode.insertBefore(errDiv,btn.nextSibling);
      return;
    }
    const jobId=data.jobId;
    btn.style.display='none';
    const stateDiv=btn.closest('[style*="flex-direction"]')||btn.parentNode;
    const badgeEl=stateDiv.querySelector('.state-badge');
    if(badgeEl){badgeEl.className='state-badge badge-generating';badgeEl.innerHTML='\u25cf Generating';}
    const progressEl=document.createElement('div'); progressEl.className='row-progress'; progressEl.id='rp-'+videoId;
    progressEl.innerHTML='<div class="step active"><div class="step-spinner"></div> Starting\u2026</div>';
    stateDiv.appendChild(progressEl);
    await fetch('/queue',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId,youtubeUrl})}).catch(()=>{});
    startPolling(jobId,videoId,row.querySelector('.row-summary'));
  }catch(err){btn.disabled=false;btn.textContent='Generate';}
}

async function addToQueue(){
  const input = document.getElementById('addUrlInput');
  const btn   = document.getElementById('addBtn');
  const url   = input.value.trim();
  if (!url) { input.style.borderColor='var(--red-bd)'; setTimeout(()=>input.style.borderColor='',1500); return; }
  btn.disabled=true; btn.textContent='Adding…';
  try{
    const res  = await fetch('/queue',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({youtubeUrl:url})});
    const data = await res.json();
    if(!res.ok){
      btn.disabled=false; btn.textContent='+ Add to Queue';
      input.style.borderColor='var(--red-bd)';
      input.placeholder = data.error || 'Error — check URL';
      setTimeout(()=>{input.style.borderColor='';input.placeholder='Paste YouTube URL to add to queue…';},3000);
      return;
    }
    input.value='';
    btn.textContent='✓ Added';
    btn.style.color='rgba(62,207,142,0.80)';
    setTimeout(()=>{btn.disabled=false;btn.textContent='+ Add to Queue';btn.style.color='';},2000);
    await loadQueue();
  }catch(err){
    btn.disabled=false; btn.textContent='+ Add to Queue';
    console.error('Add to queue error:',err);
  }
}

async function moveQueueItem(videoId, direction){
  try{
    const res  = await fetch('/queue');
    const data = await res.json();
    const queue = data.queue || [];
    const idx   = queue.findIndex(q => q.videoId === videoId);
    if(idx === -1) return;
    const newIdx = direction === 'up' ? idx - 1 : idx + 1;
    if(newIdx < 0 || newIdx >= queue.length) return;
    // Swap
    const temp     = queue[idx];
    queue[idx]     = queue[newIdx];
    queue[newIdx]  = temp;
    const order = queue.map(q => q.videoId);
    await fetch('/queue/reorder',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({order})});
    await loadQueue();
  }catch(err){
    console.error('Reorder error:',err);
  }
}

async function generateYTMetadata(videoId,youtubeUrl,title){
  const btn = document.getElementById('ytbtn-'+videoId);
  if(btn){ btn.disabled=true; btn.textContent='Generating…'; }
  try{
    const res = await fetch('/api/youtube-metadata',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({videoId,youtubeUrl,title})
    });
    const data = await res.json();
    if(!res.ok){
      if(btn){ btn.disabled=false; btn.textContent='▶ YT Metadata'; }
      const row=document.querySelector('.queue-row[data-videoid="'+videoId+'"]');
      if(row){
        const errDiv=document.createElement('div');
        errDiv.style.cssText='font-size:12px;color:var(--red);margin-top:6px;padding:6px 10px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:4px;';
        errDiv.textContent='YT Metadata error: '+(data.error||'Unknown error');
        btn.parentNode.insertBefore(errDiv,btn.nextSibling);
      }
      return;
    }
    if(btn){ btn.textContent='✓ YT Meta Ready'; btn.style.background='rgba(62,207,142,0.10)'; btn.style.color='rgba(62,207,142,0.80)'; btn.style.borderColor='rgba(62,207,142,0.25)'; }
    // Show metadata panel below the row
    const row=document.querySelector('.queue-row[data-videoid="'+videoId+'"]');
    if(row){ renderYTMetaPanel(row,data.metadata); }
  }catch(err){
    if(btn){ btn.disabled=false; btn.textContent='▶ YT Metadata'; }
    console.error('YT Metadata error:',err);
  }
}

function renderYTMetaPanel(row,meta){
  // Remove existing panel if any
  const existing=row.querySelector('.yt-meta-panel');
  if(existing) existing.remove();

  const panel=document.createElement('div');
  panel.className='yt-meta-panel';

  const alts=(meta.titleAlternatives||[]).map((a,i)=>
    '<div class="yt-meta-alt" onclick="navigator.clipboard.writeText('+JSON.stringify(a.title)+').then(()=>this.style.color=\'rgba(62,207,142,0.80)\')" title="'+escHtml(a.reasoning)+'">Alt '+(i+1)+': '+escHtml(a.title)+'</div>'
  ).join('');

  const tags=(meta.tags||[]).map(t=>'<span class="yt-meta-tag">'+escHtml(t)+'</span>').join('');
  const descHook=meta.description?.hook || '';
  const descFull=(meta.description?.full||'').replace(/\n/g,'\n');

  panel.innerHTML=
    '<div class="yt-meta-title-row">'
      +'<span class="yt-meta-label">Title</span>'
      +'<span class="yt-meta-value">'+escHtml(meta.primaryTitle||'')+'</span>'
      +'<button class="btn-copy-meta" onclick="navigator.clipboard.writeText('+JSON.stringify(meta.primaryTitle||'')+').then(()=>this.textContent=\'✓ Copied\').then(()=>setTimeout(()=>this.textContent=\'Copy Title\',2000))">Copy Title</button>'
    +'</div>'
    +(alts ? '<div style="margin-bottom:10px;">'+alts+'</div>' : '')
    +'<div class="yt-meta-label" style="margin-bottom:6px;">Hook (first 125 chars)</div>'
    +'<div class="yt-meta-desc" style="max-height:60px;">'+escHtml(descHook)+'</div>'
    +'<div class="yt-meta-label" style="margin-bottom:6px;">Full Description</div>'
    +'<div class="yt-meta-desc">'+escHtml(descFull)+'</div>'
    +'<button class="btn-copy-meta" onclick="navigator.clipboard.writeText('+JSON.stringify(descFull)+').then(()=>this.textContent=\'✓ Copied\').then(()=>setTimeout(()=>this.textContent=\'Copy Description\',2000))">Copy Description</button>'
    +'<div class="yt-meta-label" style="margin:10px 0 6px;">Tags</div>'
    +'<div class="yt-meta-tags">'+tags+'</div>'
    +'<button class="btn-copy-meta" onclick="navigator.clipboard.writeText('+JSON.stringify((meta.tags||[]).join(', '))+').then(()=>this.textContent=\'✓ Copied\').then(()=>setTimeout(()=>this.textContent=\'Copy Tags\',2000))">Copy Tags</button>'
    +(meta.thumbnailConcept ? '<div class="yt-meta-thumb" style="margin-top:10px;">🖼 Thumbnail: <strong>'+escHtml(meta.thumbnailConcept.textOverlay||'')+'</strong> — '+escHtml(meta.thumbnailConcept.reasoning||'')+'</div>' : '');

  row.appendChild(panel);
}

function startPolling(jobId,videoId,summaryEl){
  if(pollTimers[jobId])return;
  const getProgress=()=>document.getElementById('rp-'+videoId);
  const poll=async()=>{
    try{
      const res=await fetch('/generate-status?jobId='+jobId);
      const data=await res.json();
      const step=data.step||''; const status=data.status||''; const reason=data.reason||'';
      const progressEl=getProgress();
      if(progressEl){
        if(status==='complete'){
          progressEl.innerHTML='<div class="step done">\u2713 Content ready \u2014 click row to review</div>';
        }else if(status==='error'){
          progressEl.innerHTML='<div class="step" style="color:var(--red);background:var(--red-bg);border:1px solid var(--red-bd);border-radius:4px;padding:8px 12px;">\u2715 '+escHtml(reason||'Generation failed')+'</div>';
        }else{
          const ci=STEPS.indexOf(step);
          progressEl.innerHTML=STEPS.map((s,i)=>{
            const cls=i<ci?'done':i===ci?'active':'pending';
            const icon=i<ci?'\u2713':i===ci?'<div class="step-spinner"></div>':'\u25cb';
            return '<div class="step '+cls+'">'+icon+' '+(STEP_LABELS[s]||s)+'</div>';
          }).join('');
        }
      }
      if(status==='complete'){clearInterval(pollTimers[jobId]);delete pollTimers[jobId];setTimeout(()=>loadQueue(),600);}
      else if(status==='error'){clearInterval(pollTimers[jobId]);delete pollTimers[jobId];}
    }catch{}
  };
  poll(); pollTimers[jobId]=setInterval(poll,4000);
}

function switchTab(pc,tb,key){
  tb.querySelectorAll('.ptab').forEach(t=>t.classList.toggle('active',t.dataset.panel===key));
  pc.querySelectorAll('.ppanel').forEach(p=>p.classList.toggle('active',p.dataset.panel===key));
}
function showPubResult(container,msg,ok){const el=container.querySelector('.pub-result');if(!el)return;el.textContent=msg;el.className='pub-result '+(ok?'ok':'err');}
function formatDate(str){if(!str)return'\u2014';try{return new Date(str).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch{return str;}}
function escHtml(str){if(!str)return'';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener('DOMContentLoaded',init);
</script>
