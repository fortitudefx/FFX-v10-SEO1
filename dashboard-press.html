<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFX Press</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/dashboard-styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
  <div class="nav-wordmark">FFX <span>·</span> Internal</div>
  <div class="nav-links">
    <a href="/dashboard.html"           class="nav-link">Dashboard</a>
    <a href="/dashboard-press.html"     class="nav-link active">Press</a>
    <a href="/dashboard-queue.html"     class="nav-link">Queue</a>
    <a href="/dashboard-knowledge.html" class="nav-link">Knowledge</a>
    <a href="/dashboard-seo.html"       class="nav-link">SEO</a>
    <a href="/dashboard-audience.html"  class="nav-link">Audience</a>
    <a href="/dashboard-youtube.html"   class="nav-link">YouTube</a>
  </div>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
  <div class="page-header-left">
    <div class="wordmark">FFX <span>Press</span></div>
    <div class="header-count" id="headerCount">—</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="status-dot"></div>
    <button class="btn-generate" onclick="toggleGeneratePanel()">+ Generate</button>
  </div>
  </div>
</div>

<div class="generate-panel" id="generatePanel">
  <div class="generate-panel-inner">
  <div class="gen-title">New Content Generation</div>
  <div class="gen-row">
    <input type="url" class="gen-input" id="genUrl" placeholder="https://youtu.be/..." autocomplete="off" spellcheck="false">
    <button class="btn-primary" id="genBtn" onclick="startGeneration()">Generate</button>
  </div>
  <div class="gen-status" id="genStatus"></div>
  </div>
</div>

<div class="content-wrap">
  <div class="table-header">
    <div>Video</div>
    <div>Title &amp; Details</div>
    <div>Platforms</div>
    <div>Date</div>
  </div>
  <div id="videoList">
    <div class="loading-state">
      <div class="loading-spin"></div>
      <div class="loading-text">Loading FFX Press…</div>
    </div>
  </div>
</div>

<script>
let allVideos = [];

const PLATFORMS = [
  {key:'blog',label:'Blog'},{key:'x',label:'X'},{key:'linkedin',label:'LinkedIn'},
  {key:'tumblr',label:'Tumblr'},{key:'discord',label:'Discord'}
];
const FIELD_MAP = {
  blog:['body'],x:['tweet1','tweet2','tweet3','tweet4','tweet5','tweet6'],
  linkedin:['linkedin'],discord:['discord'],tumblr:['tumblr']
};

async function init() {
  const params = new URLSearchParams(window.location.search);
  const preVideoId = params.get('video');
  await loadAll();
  if (preVideoId) {
    setTimeout(() => {
      const row = document.querySelector('[data-videoid="'+preVideoId+'"]');
      if (row && !row.classList.contains('open')) { row.querySelector('.row-summary').click(); row.scrollIntoView({behavior:'smooth',block:'start'}); }
    }, 300);
  }
}

async function loadAll() {
  try {
    const res  = await fetch('/press-data');
    const data = await res.json();
    if (!res.ok) { document.getElementById('videoList').innerHTML='<div class="empty-state"><p>Error: '+escHtml(data.error||'Unknown')+'</p></div>'; return; }
    allVideos = data.videos || [];
    document.getElementById('headerCount').textContent = allVideos.length + ' videos';
    renderVideoList(allVideos);
  } catch (err) {
    document.getElementById('videoList').innerHTML='<div class="empty-state"><p>Network error: '+escHtml(err.message)+'</p></div>';
  }
}

function renderVideoList(videos) {
  const list = document.getElementById('videoList');
  if (!videos.length) { list.innerHTML='<div class="empty-state"><p>No published videos yet.</p></div>'; return; }
  list.innerHTML = '';
  videos.forEach(v => list.appendChild(buildVideoRow(v)));
}

function buildVideoRow(video) {
  const row = document.createElement('div'); row.className='video-row';
  row.dataset.videoid = video.videoId || video.slug;
  const videoId  = video.videoId || '';
  const ytUrl    = video.youtubeUrl||video.globalContent?.youtubeUrl||video.content?.youtubeUrl||'';
  const isRealId = videoId && videoId.length <= 12;
  const thumbUrl = isRealId ? 'https://img.youtube.com/vi/'+videoId+'/mqdefault.jpg' : '';
  const date     = formatDate(video.updatedAt||'');
  const region   = video.region||'Global';
  const platforms= video.platforms||{};

  const summary = document.createElement('div'); summary.className='row-summary'; summary.style.cursor='default';
  const thumbHtml = thumbUrl
    ? '<div class="row-thumb-wrap"><img class="row-thumb" src="'+thumbUrl+'" alt="" loading="lazy" onerror="this.outerHTML=\'<div class=\\\'row-thumb-placeholder\\\'>No thumb</div>\'"></div>'
    : '<div class="row-thumb-wrap"><div class="row-thumb-placeholder">No thumb</div></div>';

  summary.innerHTML = thumbHtml
    + '<div class="row-info">'
    + '<div class="row-title">'+escHtml(video.title||'Untitled')+'</div>'
    + '<div class="row-meta"><span class="region-tag '+regionClass(region)+'">'+region+'</span><span style="color:var(--dim)">'+escHtml(video.slug||'')+'</span></div>'
    + (ytUrl ? '<a class="row-yt-url" href="'+escHtml(ytUrl)+'" target="_blank" onclick="event.stopPropagation()">'+escHtml(ytUrl)+'</a>' : '')
    + '</div>'
    + '<div class="platform-pills">'+PLATFORMS.map(p=>'<span class="pill '+pillClass(platforms[p.key]?.status||'')+'">'+p.label+'</span>').join('')+'</div>'
    + '<div class="row-date">'+date+'<span class="row-chevron">▼</span></div>';

  // Only title/info text and date are clickable — thumbnail and empty space are inert
  summary.querySelector('.row-info').style.cursor = 'pointer';
  summary.querySelector('.row-date').style.cursor = 'pointer';
  summary.querySelector('.row-info').addEventListener('click', (e) => { if(e.target.closest('.row-yt-url'))return; toggleRow(row, video); });
  summary.querySelector('.row-date').addEventListener('click', () => toggleRow(row, video));
  row.appendChild(summary);
  const expanded = document.createElement('div'); expanded.className='row-expanded';
  row.appendChild(expanded);
  return row;
}

function toggleRow(row, video) {
  const isOpen = row.classList.contains('open');
  document.querySelectorAll('.video-row.open').forEach(r => r.classList.remove('open'));
  if (!isOpen) {
    row.classList.add('open');
    const expanded = row.querySelector('.row-expanded');
    if (!expanded.dataset.built) fetchRegenStatusAndBuild(expanded, video);
  }
}

async function fetchRegenStatusAndBuild(container, video) {
  const videoId = video.videoId||null; let regenMap={};
  if (videoId) { try { const res=await fetch('/api/regen-status?videoId='+videoId); const data=await res.json(); if(res.ok&&data.regen)regenMap=data.regen; } catch {} }
  buildExpandedContent(container, video, regenMap); container.dataset.built='1';
}

function buildExpandedContent(container, video, regenMap) {
  regenMap = regenMap||{};
  const content   = video.globalContent||video.content||video.platforms?.blog?.content||{};
  const pending   = video.pendingEdits||{};
  const platforms = video.platforms||{};
  const videoId   = video.videoId||null;
  const slug      = video.slug||null;
  const tweets = Array.isArray(pending.x_thread)&&pending.x_thread.length ? pending.x_thread
    : Array.isArray(content.x_thread)&&content.x_thread.length ? content.x_thread
    : [1,2,3,4,5,6].map(i=>pending['tweet'+i]||content['tweet'+i]).filter(Boolean);
  const regenX = regenMap['x'];
  const regenTweets = regenX ? [1,2,3,4,5,6].map(i=>regenX.fields['tweet'+i]).filter(Boolean) : null;

  const panelsData = [
    {key:'article',label:'Article',platformKey:'blog',regenKey:'article',html:()=>{const rR=regenMap['article'];return'<div class="content-block article-body" data-field="body" data-edit-active="false">'+(rR?rR.fields.body:(pending.body||content.body||'<em>No article body found.</em>'))+'</div>';}},
    {key:'x',label:'X',platformKey:'x',regenKey:'x',html:()=>{const dt=regenTweets||tweets;return dt.length?'<div class="tweet-list">'+dt.map((t,i)=>'<div class="tweet-item" data-field="tweet'+(i+1)+'" data-edit-active="false"><span class="tweet-num">'+(i+1)+'</span><span class="tweet-text">'+escHtml(t)+'</span></div>').join('')+'</div>':'<div class="content-block"><em>No tweets found.</em></div>';}},
    {key:'linkedin',label:'LinkedIn',platformKey:'linkedin',regenKey:'linkedin',html:()=>{const rR=regenMap['linkedin'];return'<div class="content-block" data-field="linkedin" data-edit-active="false">'+(rR?rR.fields.linkedin:(pending.linkedin||content.linkedin||'<em>No LinkedIn content found.</em>'))+'</div>';}},
    {key:'discord',label:'Discord',platformKey:'discord',regenKey:'discord',html:()=>{const rR=regenMap['discord'];return'<div class="content-block" data-field="discord" data-edit-active="false">'+(rR?rR.fields.discord:(pending.discord||content.discord||'<em>No Discord content found.</em>'))+'</div>';}},
    {key:'tumblr',label:'Tumblr',platformKey:'tumblr',regenKey:'tumblr',html:()=>{const rR=regenMap['tumblr'];return'<div class="content-block" data-field="tumblr" data-edit-active="false">'+(rR?rR.fields.tumblr:(pending.tumblr||content.tumblr||'<em>No Tumblr content found.</em>'))+'</div>';}}
  ];

  const tabBar=document.createElement('div'); tabBar.className='platform-tabs';
  const panelContainer=document.createElement('div'); panelContainer.className='platform-panels';

  panelsData.forEach((p,idx)=>{
    const pStatus=platforms[p.platformKey]?.status||''; const postUrl=extractPostUrl(pStatus);
    const isOk=!!postUrl; const isErr=pStatus.startsWith('Error');
    const publishedAt=platforms[p.platformKey]?.publishedAt||'';
    const editedFields=video.editedFields||[]; const regenData=regenMap[p.regenKey]||null;
    const hasRegenStaging=!!regenData;
    const hasEdited=isOk&&(FIELD_MAP[p.platformKey]||[]).some(f=>editedFields.includes(f));
    const hasPending=(FIELD_MAP[p.platformKey]||[]).some(f=>pending[f]!==undefined);

    let chipHtml='';
    if(hasRegenStaging){const msLeft=new Date(regenData.expiresAt)-Date.now();chipHtml='<span class="ptab-chip ptab-chip-regen">\u26a1 '+Math.max(0,Math.floor(msLeft/3600000))+'h '+Math.max(0,Math.floor((msLeft%3600000)/60000))+'m</span>';}
    else if(hasEdited||hasPending){chipHtml='<span class="ptab-chip ptab-chip-edited">\u26a0 Edited</span>';}
    else if(isOk){chipHtml='<span class="ptab-chip ptab-chip-ok">\u2713 Live</span>';}
    else if(isErr){chipHtml='<span class="ptab-chip ptab-chip-err">\u2715 Error</span>';}

    const tab=document.createElement('button'); tab.className='ptab'+(idx===0?' active':''); tab.dataset.panel=p.key;
    tab.innerHTML=p.label+chipHtml; tab.addEventListener('click',()=>switchTab(panelContainer,tabBar,p.key)); tabBar.appendChild(tab);

    const panel=document.createElement('div'); panel.className='ppanel'+(idx===0?' active':''); panel.dataset.panel=p.key;
    let sbCls,sbTxt;
    if(hasRegenStaging){const msLeft=new Date(regenData.expiresAt)-Date.now();sbCls='psb-chip-regen';sbTxt='\u26a1 Regen \u2014 expires '+Math.max(0,Math.floor(msLeft/3600000))+'h '+Math.max(0,Math.floor((msLeft%3600000)/60000))+'m';}
    else if(hasEdited||hasPending){sbCls='psb-chip-edited';sbTxt='\u26a0 Edited \u2014 not published';}
    else if(postUrl){sbCls='psb-chip-ok';sbTxt='\u2713 Live';}
    else if(isErr){sbCls='psb-chip-err';sbTxt='\u2715 Error';}
    else{sbCls='psb-chip-pend';sbTxt='\u25cb Not published';}

    panel.innerHTML='<div class="platform-status-bar"><div class="psb-left"><span class="psb-status-chip '+sbCls+'">'+sbTxt+'</span>'
      +(postUrl?'<a href="'+postUrl+'" target="_blank" class="psb-link">View post \u2192</a>':'')
      +(publishedAt?'<span class="psb-date">'+formatDate(publishedAt)+'</span>':'')
      +'</div></div>'+p.html();

    const hasAnythingToRestore=hasRegenStaging||hasEdited||hasPending;
    const platActionBar=document.createElement('div'); platActionBar.className='platform-action-bar';
    const regenBtn=document.createElement('button'); regenBtn.className='btn-plat-regen'; regenBtn.textContent='Regenerate';
    if(!videoId){regenBtn.disabled=true;}
    regenBtn.addEventListener('click',()=>onRegenClick(videoId,p.regenKey,regenBtn,restoreBtn,platStatusSpan,container,video));
    const restoreBtn=document.createElement('button'); restoreBtn.className='btn-plat-restore'; restoreBtn.textContent='Restore Published';
    if(!hasAnythingToRestore||!videoId)restoreBtn.disabled=true;
    restoreBtn.addEventListener('click',()=>onRestoreClick(videoId,p.regenKey,regenBtn,restoreBtn,platStatusSpan,container,video));
    const platStatusSpan=document.createElement('span'); platStatusSpan.className='plat-action-status';
    platActionBar.appendChild(regenBtn); platActionBar.appendChild(restoreBtn); platActionBar.appendChild(platStatusSpan);
    panel.appendChild(platActionBar); panelContainer.appendChild(panel);
  });

  const actionRow=document.createElement('div'); actionRow.className='action-row'; actionRow.innerHTML='<span class="action-label">Publish to:</span>';
  PLATFORMS.forEach(p=>{
    const pStatus=platforms[p.key]?.status||''; const postUrl=extractPostUrl(pStatus); const isPosted=!!postUrl;
    const chk=document.createElement('div');
    chk.className='platform-checkbox '+(isPosted?'already-posted':'checked');
    chk.dataset.platform=p.key; chk.dataset.checked=isPosted?'false':'true';
    chk.dataset.wasPosted=isPosted?'true':'false'; chk.dataset.postUrl=postUrl||'';
    const linkHtml=postUrl?' <a href="'+postUrl+'" target="_blank" style="font-size:10px;color:var(--blue);text-decoration:none;margin-left:4px;">View</a>':'';
    chk.innerHTML='<span class="chk-dot"></span>'+p.label+(isPosted?' \u2713':'')+linkHtml;
    chk.addEventListener('click',()=>{
      const c=chk.dataset.checked==='true'; chk.dataset.checked=c?'false':'true';
      const wasPosted=chk.dataset.wasPosted==='true'; const url=chk.dataset.postUrl;
      const link=url?' <a href="'+url+'" target="_blank" style="font-size:10px;color:var(--blue);text-decoration:none;margin-left:4px;">View prev</a>':'';
      if(!c){chk.classList.add('checked');chk.classList.remove('already-posted');chk.innerHTML='<span class="chk-dot"></span>'+p.label+(wasPosted?' \u21bb':'')+link;}
      else{chk.classList.remove('checked','already-posted');chk.innerHTML='<span class="chk-dot"></span>'+p.label+' \u2014'+link;}
    });
    actionRow.appendChild(chk);
  });
  const pubBtn=document.createElement('button'); pubBtn.className='btn-publish'; pubBtn.textContent='Publish';
  pubBtn.onclick=()=>publishVideo(videoId,slug,actionRow,pubBtn,container,video); actionRow.appendChild(pubBtn);
  const pubResult=document.createElement('div'); pubResult.className='pub-result';
  const inner=document.createElement('div'); inner.className='expanded-inner'; inner.innerHTML='';
  inner.appendChild(tabBar); inner.appendChild(panelContainer);
  panelContainer.querySelectorAll('.content-block[data-field]').forEach(el=>el.addEventListener('click',()=>makeEditable(el,video,el.dataset.field,regenMap)));
  panelContainer.querySelectorAll('.tweet-item[data-field]').forEach(el=>el.addEventListener('click',()=>{const ts=el.querySelector('.tweet-text');if(ts)makeEditable(ts,video,el.dataset.field,regenMap);}));
  inner.appendChild(actionRow); inner.appendChild(pubResult); container.appendChild(inner);
}

async function onRegenClick(videoId,platform,regenBtn,restoreBtn,statusSpan,container,video){
  if(!videoId)return; regenBtn.disabled=true; restoreBtn.disabled=true;
  statusSpan.className='plat-action-status active'; statusSpan.textContent='Regenerating\u2026';
  try{const res=await fetch('/api/regenerate-platform',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId,platform})});const data=await res.json();
    if(!res.ok){statusSpan.className='plat-action-status err';statusSpan.textContent=data.error||'Failed';regenBtn.disabled=false;restoreBtn.disabled=false;return;}
    await rebuildExpanded(container,video);
  }catch(err){statusSpan.className='plat-action-status err';statusSpan.textContent='Network error';regenBtn.disabled=false;restoreBtn.disabled=false;}
}
async function onRestoreClick(videoId,platform,regenBtn,restoreBtn,statusSpan,container,video){
  if(!videoId)return; if(!confirm('Restore this platform to published content?'))return;
  restoreBtn.disabled=true; regenBtn.disabled=true;
  statusSpan.className='plat-action-status active'; statusSpan.textContent='Restoring\u2026';
  try{const res=await fetch('/api/restore-platform',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId,platform})});const data=await res.json();
    if(!res.ok){statusSpan.className='plat-action-status err';statusSpan.textContent=data.error||'Failed';restoreBtn.disabled=false;regenBtn.disabled=false;return;}
    if(video.pendingEdits&&data.restoredFields)Object.keys(data.restoredFields).forEach(f=>delete video.pendingEdits[f]);
    if(Array.isArray(video.editedFields)&&data.restoredFields)video.editedFields=video.editedFields.filter(f=>!(f in data.restoredFields));
    await rebuildExpanded(container,video);
  }catch(err){statusSpan.className='plat-action-status err';statusSpan.textContent='Network error';restoreBtn.disabled=false;regenBtn.disabled=false;}
}
async function rebuildExpanded(container,video,forceTab){
  let activeTab=forceTab||null;
  if(!activeTab){const el=container.querySelector('.ptab.active');if(el)activeTab=el.dataset.panel;}
  const videoId=video.videoId||null; let regenMap={};
  if(videoId){try{const res=await fetch('/api/regen-status?videoId='+videoId);const data=await res.json();if(res.ok&&data.regen)regenMap=data.regen;}catch{}}
  container.innerHTML=''; buildExpandedContent(container,video,regenMap); container.dataset.built='1';
  if(activeTab){const tb=container.querySelector('.platform-tabs');const pc=container.querySelector('.platform-panels');if(tb&&pc)switchTab(pc,tb,activeTab);}
}
function updateTabChips(container,video,regenMap){
  regenMap=regenMap||{}; const pending=video.pendingEdits||{}; const editedFields=video.editedFields||[]; const platforms=video.platforms||{};
  container.querySelectorAll('.ptab').forEach(tab=>{
    const key=tab.dataset.panel; const platformKey=key==='article'?'blog':key;
    const pStatus=platforms[platformKey]?.status||''; const postUrl=extractPostUrl(pStatus); const isOk=!!postUrl;
    const regenKey=key==='article'?'article':key; const regenData=regenMap[regenKey]||null; const hasRegenStaging=!!regenData;
    const hasEdited=isOk&&(FIELD_MAP[platformKey]||[]).some(f=>editedFields.includes(f));
    const hasPending=(FIELD_MAP[platformKey]||[]).some(f=>pending[f]!==undefined);
    const lbl={article:'Article',x:'X',linkedin:'LinkedIn',discord:'Discord',tumblr:'Tumblr'}[key]||key;
    let chipHtml='';
    if(hasRegenStaging){const msLeft=new Date(regenData.expiresAt)-Date.now();chipHtml='<span class="ptab-chip ptab-chip-regen">\u26a1 '+Math.max(0,Math.floor(msLeft/3600000))+'h</span>';}
    else if(hasEdited||hasPending){chipHtml='<span class="ptab-chip ptab-chip-edited">\u26a0 Edited</span>';}
    else if(isOk){chipHtml='<span class="ptab-chip ptab-chip-ok">\u2713 Live</span>';}
    tab.innerHTML=lbl+chipHtml;
  });
}
function switchTab(pc,tb,key){
  tb.querySelectorAll('.ptab').forEach(t=>t.classList.toggle('active',t.dataset.panel===key));
  pc.querySelectorAll('.ppanel').forEach(p=>p.classList.toggle('active',p.dataset.panel===key));
}
async function publishVideo(videoId,slug,actionRow,pubBtn,container,video){
  container.querySelectorAll('[data-edit-active="true"]').forEach(el=>{el.setAttribute('contenteditable','false');el.dataset.editActive='false';});
  container.querySelectorAll('.edit-save-bar').forEach(bar=>bar.classList.remove('visible'));
  const platforms={};
  actionRow.querySelectorAll('.platform-checkbox').forEach(el=>{platforms[el.dataset.platform]=el.dataset.checked==='true';});
  if(!Object.values(platforms).some(v=>v)){showPubResult(container,'Select at least one platform.',false);return;}
  pubBtn.disabled=true; pubBtn.textContent='Publishing\u2026';
  try{const res=await fetch('/press-publish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId,slug,platforms})});const data=await res.json();
    if(!res.ok){showPubResult(container,data.error||'Publish failed.',false);pubBtn.disabled=false;pubBtn.textContent='Publish';return;}
    if(data.status){if(!video.platforms)video.platforms={};Object.keys(data.status).forEach(p=>{const s=data.status[p];if(!s||s==='not_selected'||s==='pending')return;if(!video.platforms[p])video.platforms[p]={};video.platforms[p].status=s;video.platforms[p].publishedAt=new Date().toISOString();});}
    const row=container.closest('.video-row'); if(data.status)updatePills(row,data.status);
    await rebuildExpanded(container,video); showPubResult(container,'\u2713 Published successfully',true); pubBtn.disabled=false; pubBtn.textContent='Publish';
  }catch(err){showPubResult(container,'Network error: '+err.message,false);pubBtn.disabled=false;pubBtn.textContent='Publish';}
}
function showPubResult(container,msg,ok){const el=container.querySelector('.pub-result');if(!el)return;el.textContent=msg;el.className='pub-result '+(ok?'ok':'err');}
function updatePills(row,status){const pills=row.querySelectorAll('.pill');PLATFORMS.forEach((p,i)=>{if(!pills[i])return;pills[i].className='pill '+pillClass(status[p.key]||'');});}
function makeEditable(el,video,field,regenMap){
  if(el.dataset.editActive==='true')return; el.dataset.editActive='true'; const original=el.innerText;
  el.setAttribute('contenteditable','true'); el.focus();
  let bar=el.nextElementSibling;
  if(!bar||!bar.classList.contains('edit-save-bar')){bar=document.createElement('div');bar.className='edit-save-bar';bar.innerHTML='<span class="edit-save-bar-label">Editing '+field+' \u2014 unsaved</span><button class="btn-edit-discard">Discard</button><button class="btn-edit-save">Save</button>';el.parentNode.insertBefore(bar,el.nextSibling);}
  bar.classList.add('visible');
  bar.querySelector('.btn-edit-save').onclick=()=>saveEdit(el,bar,video,field,original,regenMap);
  bar.querySelector('.btn-edit-discard').onclick=()=>{el.setAttribute('contenteditable','false');el.innerText=original;el.dataset.editActive='false';bar.classList.remove('visible');};
}
async function saveEdit(el,bar,video,field,original,regenMap){
  const saveBtn=bar.querySelector('.btn-edit-save'); saveBtn.disabled=true; saveBtn.textContent='Saving\u2026';
  const value=el.innerText.trim(); const videoId=video.videoId||null; const slug=video.slug||null;
  const regenPlatformForField=getRegenPlatformForField(field);
  try{const res=await fetch('/save-edits',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId,slug,kvType:'published',field,value})});const data=await res.json();
    if(!res.ok){saveBtn.disabled=false;saveBtn.textContent='Save';bar.querySelector('.edit-save-bar-label').textContent='Error: '+(data.error||'Save failed');return;}
    if(!video.pendingEdits)video.pendingEdits={};video.pendingEdits[field]=value;
    const tm=field.match(/^tweet([1-6])$/);if(tm){if(!Array.isArray(video.pendingEdits.x_thread))video.pendingEdits.x_thread=[];video.pendingEdits.x_thread[parseInt(tm[1])-1]=value;}
    if(!Array.isArray(video.editedFields))video.editedFields=[];if(!video.editedFields.includes(field))video.editedFields.push(field);
    el.setAttribute('contenteditable','false');el.dataset.editActive='false';bar.classList.remove('visible');saveBtn.disabled=false;saveBtn.textContent='Save';
    if(regenPlatformForField&&regenMap&&regenMap[regenPlatformForField]&&videoId){try{await fetch('/api/regen-status?videoId='+videoId+'&platform='+regenPlatformForField,{method:'DELETE'});}catch{}delete regenMap[regenPlatformForField];}
    const ec=el.closest('.row-expanded');
    if(ec){updateTabChips(ec,video,regenMap);const tabKey=regenPlatformForField==='article'?'article':regenPlatformForField;if(tabKey){const ap=ec.querySelector('.ppanel[data-panel="'+tabKey+'"]');if(ap){const rb=ap.querySelector('.btn-plat-restore');if(rb){rb.disabled=false;}}}}
  }catch(err){saveBtn.disabled=false;saveBtn.textContent='Save';bar.querySelector('.edit-save-bar-label').textContent='Network error \u2014 try again';}
}
function getRegenPlatformForField(field){if(field==='body')return'article';if(/^tweet[1-6]$/.test(field))return'x';if(field==='linkedin')return'linkedin';if(field==='discord')return'discord';if(field==='tumblr')return'tumblr';return null;}
function toggleGeneratePanel(){document.getElementById('generatePanel').classList.toggle('open');}
async function startGeneration(){
  const url=document.getElementById('genUrl').value.trim(); const btn=document.getElementById('genBtn');
  if(!url){setGenStatus('Paste a YouTube URL first.','err');return;}
  btn.disabled=true; btn.textContent='Checking\u2026'; setGenStatus('Checking records\u2026','active');
  try{
    const statusRes=await fetch('/kv-status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({youtubeUrl:url})});
    const statusData=await statusRes.json();
    if(statusData.found){btn.disabled=false;btn.textContent='Generate';document.getElementById('generatePanel').classList.remove('open');document.getElementById('genUrl').value='';setGenStatus('','');const videoId=statusData.videoId||extractVideoIdFromUrl(url);const row=document.querySelector('[data-videoid="'+videoId+'"]');if(row){if(!row.classList.contains('open'))row.querySelector('.row-summary').click();row.scrollIntoView({behavior:'smooth',block:'start'});}else{setGenStatus('Already published.','done');}return;}
    btn.textContent='Generating\u2026'; setGenStatus('Sending to queue\u2026','active');
    const genRes=await fetch('/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({youtubeUrl:url})});
    const genData=await genRes.json();
    if(!genRes.ok){setGenStatus('Error: '+(genData.error||genRes.status),'err');btn.disabled=false;btn.textContent='Generate';return;}
    const videoId=genData.videoId||extractVideoIdFromUrl(url);
    if(videoId){await fetch('/queue',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId,youtubeUrl:url})}).catch(()=>{});}
    setGenStatus('\u2713 Queued \u2014 check Queue page for progress.','done');
    btn.disabled=false;btn.textContent='Generate';
    document.getElementById('generatePanel').classList.remove('open');document.getElementById('genUrl').value='';
  }catch(err){setGenStatus('Network error: '+err.message,'err');btn.disabled=false;btn.textContent='Generate';}
}
function extractVideoIdFromUrl(url){try{const u=new URL(url);if(u.hostname==='youtu.be')return u.pathname.slice(1).split('?')[0];if(u.hostname.includes('youtube.com'))return u.searchParams.get('v')||null;}catch{}return null;}
function setGenStatus(msg,cls){const el=document.getElementById('genStatus');el.textContent=msg;el.className='gen-status'+(cls?' '+cls:'');}
function extractPostUrl(s){if(!s)return null;if(s.startsWith('http'))return s;if(s.startsWith('=HYPERLINK(')){const m=s.match(/=HYPERLINK\("([^"]+)"/);return m?m[1]:null;}return null;}
function pillClass(s){if(!s)return'pill-pend';if(extractPostUrl(s))return'pill-ok';if(s.startsWith('Error'))return'pill-error';return'pill-pend';}
function regionClass(r){if(!r||r==='Global')return'region-global';if(r.includes('GCC'))return'region-gcc';if(r.includes('US')||r.includes('Canada'))return'region-us';return'region-global';}
function formatDate(str){if(!str)return'\u2014';try{return new Date(str).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch{return str;}}
function escHtml(str){if(!str)return'';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener('DOMContentLoaded',init);
document.getElementById('genUrl')?.addEventListener('keydown',e=>{if(e.key==='Enter')startGeneration();});
</script>
