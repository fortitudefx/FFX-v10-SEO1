# Netlify configuration — FortitudeFX v11

[functions]
  directory = "netlify/functions"

# ── Page redirects ────────────────────────────────────────────────────────────
[[redirects]]
  from = "/"
  to   = "/index-v11.html"
  status = 200

[[redirects]]
  from = "/bootcamp"
  to   = "/bootcamp-v11.html"
  status = 200

[[redirects]]
  from = "/vip-discord"
  to   = "/vipdiscord-v11.html"
  status = 200

[[redirects]]
  from = "/waitlist"
  to   = "/waitlist-v11.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to   = "/privacy-v11.html"
  status = 200

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
