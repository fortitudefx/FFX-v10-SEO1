<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFX — Retry Post</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #06060a; --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08);
      --accent: #a78bfa; --gold: #c9a84c; --gold-text: #d4a843;
      --text: rgba(255,255,255,0.90); --muted: rgba(255,255,255,0.38); --radius: 14px;
    }
    html, body { min-height: 100vh; background: var(--bg); font-family: 'Satoshi', sans-serif; color: var(--text); }
    .bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .glow { position: absolute; border-radius: 50%; filter: blur(120px); }
    .glow-1 { width: 700px; height: 700px; top: -200px; right: -200px; background: rgba(109,40,217,0.28); }
    .glow-2 { width: 600px; height: 600px; bottom: -100px; left: -200px; background: rgba(45,20,114,0.32); }
    .wrap { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; padding: 64px 32px 96px; }
    .header { margin-bottom: 48px; }
    .header-kicker {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gold-text); margin-bottom: 16px;
    }
    .header-kicker::before {
      content: ""; width: 4px; height: 4px; border-radius: 50%;
      background: var(--gold); box-shadow: 0 0 8px rgba(201,168,76,0.65); flex-shrink: 0;
    }
    .header h1 { font-size: 2.4rem; font-weight: 800; letter-spacing: -0.04em; line-height: 0.96; color: #fff; margin-bottom: 12px; }
    .header p { font-size: 0.92rem; color: var(--muted); line-height: 1.7; }
    .form { display: flex; flex-direction: column; gap: 28px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
    .hint { font-size: 11px; color: rgba(255,255,255,0.22); margin-top: -4px; }
    input[type="text"] {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-family: 'Satoshi', sans-serif;
      font-size: 0.94rem; padding: 14px 16px; outline: none;
      transition: border-color 0.22s ease, box-shadow 0.22s ease;
    }
    input[type="text"]:focus {
      border-color: rgba(167,139,250,0.40); box-shadow: 0 0 0 3px rgba(167,139,250,0.08);
    }
    .platforms { display: flex; flex-direction: column; gap: 12px; }
    .platform-item {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 18px; cursor: pointer;
      transition: border-color 0.22s ease, background 0.22s ease;
    }
    .platform-item:hover { border-color: rgba(167,139,250,0.30); }
    .platform-item.selected {
      border-color: rgba(167,139,250,0.50);
      background: rgba(167,139,250,0.08);
    }
    .platform-item input[type="checkbox"] { display: none; }
    .checkbox-box {
      width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.20);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.18s ease, border-color 0.18s ease;
    }
    .platform-item.selected .checkbox-box {
      background: var(--accent); border-color: var(--accent);
    }
    .checkbox-box svg { display: none; width: 11px; height: 11px; stroke: #fff; stroke-width: 2.5; fill: none; }
    .platform-item.selected .checkbox-box svg { display: block; }
    .platform-name { font-size: 0.94rem; font-weight: 600; color: var(--text); }
    .platform-desc { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }
    .select-all-row { display: flex; gap: 12px; }
    .btn-text {
      font-size: 11px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--accent); background: none; border: none; cursor: pointer; padding: 0;
    }
    .btn-text:hover { opacity: 0.75; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
    .submit-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .submit-note { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .btn-retry {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
      color: #fff; font-family: 'Satoshi', sans-serif; font-size: 14px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; border: none; border-radius: 999px;
      padding: 14px 32px; cursor: pointer; transition: opacity 0.22s ease, transform 0.22s ease;
      white-space: nowrap; flex-shrink: 0;
    }
    .btn-retry:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-retry:active { transform: translateY(0); }
    .btn-retry:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-retry svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .status { display: none; padding: 16px 20px; border-radius: var(--radius); font-size: 0.92rem; font-weight: 500; line-height: 1.6; }
    .status.success { display: block; background: rgba(34,197,94,0.10); border: 1px solid rgba(34,197,94,0.24); color: #4ade80; }
    .status.error { display: block; background: rgba(239,68,68,0.10); border: 1px solid rgba(239,68,68,0.24); color: #f87171; }
    .status.loading { display: block; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.20); color: var(--accent); }
    @media (max-width: 600px) { .wrap { padding: 40px 20px 64px; } }
  </style>

  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
</head>
<body>
  <div class="bg">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
  </div>

  <div class="wrap">
    <div class="header">
      <div class="header-kicker">FortitudeFX</div>
      <h1>Retry Post</h1>
      <p>Re-run failed platforms for an already-published article. Enter the slug and select which platforms to retry.</p>
    </div>

    <div class="form">

      <div class="field">
        <label>Article Slug <span style="color:var(--gold-text)">*</span></label>
        <p class="hint">Exact slug from articles.json</p>
        <input type="text" id="slug" placeholder="why-your-strategy-fails" required />
      </div>

      <hr class="divider" />

      <div class="field">
        <label>Platforms to Retry</label>
        <div class="select-all-row">
          <button class="btn-text" onclick="selectAll()">Select All</button>
          <button class="btn-text" onclick="selectNone()">Clear All</button>
        </div>
        <div class="platforms">

          <label class="platform-item" id="item-tweet" onclick="toggle('tweet')">
            <input type="checkbox" id="tweet" />
            <div class="checkbox-box">
              <svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>
            </div>
            <div>
              <div class="platform-name">X (Twitter)</div>
              <div class="platform-desc">Re-post thread via /tweet Worker</div>
            </div>
          </label>

          <label class="platform-item" id="item-discord" onclick="toggle('discord')">
            <input type="checkbox" id="discord" />
            <div class="checkbox-box">
              <svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>
            </div>
            <div>
              <div class="platform-name">Discord</div>
              <div class="platform-desc">Re-post to #blog-updates via /discord Worker</div>
            </div>
          </label>

          <!-- TUMBLR — disabled until account ready
          <label class="platform-item" id="item-tumblr" onclick="toggle('tumblr')">
            <input type="checkbox" id="tumblr" />
            <div class="checkbox-box">
              <svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>
            </div>
            <div>
              <div class="platform-name">Tumblr</div>
              <div class="platform-desc">Re-post via /tumblr Worker</div>
            </div>
          </label>
          -->

          <!-- LINKEDIN — disabled until Developer App ready
          <label class="platform-item" id="item-linkedin" onclick="toggle('linkedin')">
            <input type="checkbox" id="linkedin" />
            <div class="checkbox-box">
              <svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>
            </div>
            <div>
              <div class="platform-name">LinkedIn</div>
              <div class="platform-desc">Re-post via /linkedin Worker</div>
            </div>
          </label>
          -->

        </div>
      </div>

      <div id="status" class="status"></div>

      <div class="submit-row">
        <p class="submit-note">Only selected platforms will run.<br>Blog is not re-published on retry.</p>
        <button class="btn-retry" id="retryBtn" onclick="retry()">
          <svg viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          Retry Selected
        </button>
      </div>

    </div>
  </div>

  <script>
    // Replace with your Make FFX RETRY webhook URL when created
    const RETRY_WEBHOOK = 'REPLACE_WITH_MAKE_FFX_RETRY_WEBHOOK_URL';

    const platforms = ['tweet', 'discord'];
    // Add 'tumblr', 'linkedin' here when those platforms are enabled

    function toggle(id) {
      const item = document.getElementById('item-' + id);
      const cb = document.getElementById(id);
      cb.checked = !cb.checked;
      item.classList.toggle('selected', cb.checked);
    }

    function selectAll() {
      platforms.forEach(id => {
        document.getElementById(id).checked = true;
        document.getElementById('item-' + id).classList.add('selected');
      });
    }

    function selectNone() {
      platforms.forEach(id => {
        document.getElementById(id).checked = false;
        document.getElementById('item-' + id).classList.remove('selected');
      });
    }

    async function retry() {
      const slug = document.getElementById('slug').value.trim();
      if (!slug) {
        showStatus('error', 'Slug is required.');
        return;
      }
      if (!/^[a-z0-9-]+$/.test(slug)) {
        showStatus('error', 'Slug must be lowercase letters, numbers and hyphens only.');
        return;
      }

      const selected = platforms.filter(id => document.getElementById(id).checked);
      if (selected.length === 0) {
        showStatus('error', 'Select at least one platform to retry.');
        return;
      }

      if (RETRY_WEBHOOK === 'REPLACE_WITH_MAKE_FFX_RETRY_WEBHOOK_URL') {
        showStatus('error', 'Retry webhook not configured yet. Add Make FFX RETRY webhook URL to retry.html.');
        return;
      }

      const btn = document.getElementById('retryBtn');
      btn.disabled = true;
      showStatus('loading', 'Retrying ' + selected.join(', ') + '...');

      try {
        const res = await fetch(RETRY_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug, platforms: selected })
        });
        if (res.ok || res.status === 200) {
          showStatus('success', 'Retry triggered for: ' + selected.join(', ') + '. Check Make.com logs for results.');
        } else {
          showStatus('error', 'Error ' + res.status + ' - check Make.com logs.');
        }
      } catch(e) {
        showStatus('error', 'Network error - check connection and try again.');
      }
      btn.disabled = false;
    }

    function showStatus(type, msg) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.textContent = msg;
    }
  </script>
</body>
</html>
